<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator 💖</title>
    <link rel="stylesheet" href="love.css">
</head>
<body>

    <div class="card">
        <h1>💘 Love Calculator 💘</h1>

        <form id="loveForm">
            <div class="input-group">
                <label> Boy's Name</label>
                <input type="text" id="boy" placeholder="Enter boy name" required>
            </div>

            <div class="input-group">
                <label> Girl's Name</label>
                <input type="text" id="girl" placeholder="Enter girl name" required>
            </div>

            <button type="submit">❤️ Calculate Love</button>
        </form>

        <h2 id="result">✨ Your love result will appear here ✨</h2>
    </div>

    <script src="love.js"></script>
</body>
</html>
